<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>히로의 상담 신청소</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; position: relative; }
        .login-btn { position: absolute; top: 10px; right: 10px; padding: 4px 8px; font-size: 11px; background: #333; border: 1px solid #555; color: #888; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #1e1e1e; color: white; border: 1px solid #444; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container" id="user-view">
        <button class="login-btn" onclick="googleLogin()">관리자 로그인</button>
        <h2>상담 신청</h2>
        <input type="text" id="femco" placeholder="펨코 닉네임">
        <input type="text" id="nick" placeholder="인게임 닉네임">
        <input type="text" id="link" placeholder="블라링크">
        <select id="attr"><option>작열</option><option>풍압</option><option>철갑</option><option>수냉</option><option>전격</option></select>
        <textarea id="purpose" placeholder="상담 목적" rows="3"></textarea>
        <button onclick="apply()">신청하기</button>
        <h2>상태 조회</h2>
        <input type="text" id="check-femco" placeholder="펨코 닉네임">
        <input type="text" id="check-nick" placeholder="인게임 닉네임">
        <button onclick="check()">조회하기</button>
        <div id="result" style="margin-top:10px;"></div>
    </div>

    <div class="container hidden" id="admin-view">
        <h2>관리자 페이지</h2>
        <div id="admin-list"></div>
        <button onclick="location.reload()" style="background:#555;">사용자 화면으로 돌아가기</button>
    </div>

    <script>
        // ... (이전과 동일한 firebaseConfig 사용)
        const firebaseConfig = { /* ... */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const ADMIN = "dhlim0925@gmail.com";

        auth.onAuthStateChanged(u => {
            if (u?.email === ADMIN) {
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                loadAdmin();
            }
        });

        async function googleLogin() {
            try {
                const r = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                if (r.user.email !== ADMIN) { alert("관리자만 접근 가능"); auth.signOut(); }
            } catch (e) { alert(e.message); }
        }

        async function loadAdmin() {
            const s = await db.collection("consults").orderBy("time", "desc").get();
            const c = document.getElementById('admin-list');
            c.innerHTML = "";
            s.forEach(d => c.innerHTML += `<div style="padding:10px; border-bottom:1px solid #444;">${d.data().femco} - ${d.data().status} <button onclick="approve('${d.id}')">승인</button></div>`);
        }
        
        async function approve(id) { await db.collection("consults").doc(id).update({ status: "승인 완료" }); loadAdmin(); }
        // (apply와 check 함수는 이전과 동일)
    </script>
</body>
</html>
