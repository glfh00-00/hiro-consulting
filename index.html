<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>히로의 상담 신청소</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; position: relative; }
        .admin-login-area { position: absolute; top: 15px; right: 15px; z-index: 100; }
        .admin-btn { padding: 5px 10px; font-size: 12px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; border-radius: 4px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #1e1e1e; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .hidden { display: none; }
        .item { border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container" id="user-view">
        <div class="admin-login-area">
            <button class="admin-btn" onclick="googleLogin()">관리자</button>
        </div>
        <h2>상담 신청</h2>
        <input type="text" id="femco" placeholder="펨코 닉네임">
        <input type="text" id="nick" placeholder="인게임 닉네임">
        <input type="text" id="link" placeholder="블라링크">
        <select id="attr"><option>작열</option><option>풍압</option><option>철갑</option><option>수냉</option><option>전격</option></select>
        <textarea id="purpose" placeholder="상담 목적" rows="3"></textarea>
        <button onclick="apply()">신청하기</button>
        <h2 style="margin-top:40px;">상태 조회</h2>
        <input type="text" id="check-femco" placeholder="펨코 닉네임">
        <input type="text" id="check-nick" placeholder="인게임 닉네임">
        <button onclick="check()">조회하기</button>
        <div id="result" style="margin-top:10px; font-weight:bold;"></div>
    </div>

    <div class="container hidden" id="admin-view">
        <h2>관리자 페이지</h2>
        <div id="list-container"></div>
        <button onclick="location.reload()" style="background:#555;">로그아웃 및 사용자 화면으로</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9NpQAnWMnFPFcRrsQCwDhkGOlos6LRH0",
            authDomain: "nikkeclinic-1b867.firebaseapp.com",
            projectId: "nikkeclinic-1b867",
            storageBucket: "nikkeclinic-1b867.appspot.com",
            messagingSenderId: "824089888798",
            appId: "1:824089888798:web:6e341d4109c57bfc43060f",
            measurementId: "G-5SXZN1SXZ6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const ADMIN = "dhlim0925@gmail.com";

        auth.onAuthStateChanged(u => {
            if (u?.email === ADMIN) {
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                loadAdmin();
            }
        });

        async function googleLogin() {
            try {
                const r = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                if (r.user.email !== ADMIN) { alert("관리자만 접근 가능"); auth.signOut(); }
            } catch (e) { alert(e.message); }
        }

        async function apply() {
            await db.collection("consults").add({
                femco: document.getElementById('femco').value,
                nick: document.getElementById('nick').value,
                link: document.getElementById('link').value,
                attr: document.getElementById('attr').value,
                purpose: document.getElementById('purpose').value,
                status: "대기 중",
                time: new Date()
            });
            alert("신청 완료!"); location.reload();
        }

        async function check() {
            const f = document.getElementById('check-femco').value;
            const n = document.getElementById('check-nick').value;
            const s = await db.collection("consults").where("femco","==",f).where("nick","==",n).get();
            document.getElementById('result').innerText = s.empty ? "내역 없음" : "현재 상태: " + s.docs[0].data().status;
        }

        async function loadAdmin() {
            const s = await db.collection("consults").orderBy("time", "desc").get();
            const c = document.getElementById('list-container');
            c.innerHTML = "";
            s.forEach(d => {
                c.innerHTML += `<div class="item">${d.data().femco}(${d.data().nick}) - ${d.data().status}
